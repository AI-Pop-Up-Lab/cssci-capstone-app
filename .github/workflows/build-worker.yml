name: Build and Push Worker Image

on:
  push:
    branches: [main]
    paths:
      - 'ai-popup-lab-backend/**'
      - '.github/workflows/build-worker.yml'
  workflow_dispatch:

env:
  ACR_NAME: pollstercontainers  
  IMAGE_NAME: weekly-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-popup-lab-backend
          file: ./ai-popup-lab-backend/Dockerfile.worker
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}