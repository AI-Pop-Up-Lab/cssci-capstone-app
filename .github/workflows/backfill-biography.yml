name: Backfill US Panel Biographies

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: 'Weeks to backfill (e.g. 2026-20,2026-21)'
        required: true
      countries:
        description: 'Comma-separated countries'
        required: false
        default: 'usa'
      generate_events:
        description: 'Also generate events_interpretation + media_diet (true/false)'
        required: false
        default: 'false'
      force:
        description: 'Force rerun even if lock exists (true/false)'
        required: false
        default: 'false'

jobs:
  backfill-biography:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete existing ACI if present
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name backfill-biography-aci \
            --yes || true

      - name: Create and run ACI backfill worker
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name backfill-biography-aci \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/weekly-worker:latest \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --restart-policy Never \
            --location westeurope \
            --cpu 2 \
            --memory 4 \
            --command-line "python -m data_generation.backfill_entry" \
            --environment-variables \
              ENV=production \
              COUNTRIES="${{ github.event.inputs.countries }}" \
              JOB_TYPE="biography" \
              BACKFILL_WEEKS="${{ github.event.inputs.weeks }}" \
              BACKFILL_FORCE="${{ github.event.inputs.force }}" \
              GENERATE_EVENTS="${{ github.event.inputs.generate_events }}" \
              BLOB_CONTAINER_NAME=generated-data \
            --secure-environment-variables \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              AZURE_OPENAI_MODEL="${{ secrets.AZURE_OPENAI_MODEL }}" \
              AZURE_OPENAI_BASE_URL="${{ secrets.AZURE_OPENAI_BASE_URL }}" \
              COHERE_API_KEY="${{ secrets.COHERE_API_KEY }}" \
            --os-type Linux

      - name: Wait for ACI to finish
        timeout-minutes: 720
        run: |
          while true; do
            STATE=$(az container show \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name backfill-biography-aci \
              --query "containers[0].instanceView.currentState.state" \
              --output tsv)
            echo "Container state: $STATE"
            if [ "$STATE" = "Terminated" ]; then break; fi
            sleep 30
          done

      - name: Check exit code
        run: |
          EXIT_CODE=$(az container show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name backfill-biography-aci \
            --query "containers[0].instanceView.currentState.exitCode" \
            --output tsv)
          echo "Exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Backfill failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Print container logs
        if: always()
        run: |
          az container logs \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name backfill-biography-aci

      - name: Clean up ACI
        if: always()
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name backfill-biography-aci \
            --yes