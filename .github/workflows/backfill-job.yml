name: Backfill Data Generation

on:
  workflow_dispatch:
    inputs:
      countries:
        description: 'Comma-separated countries'
        required: true
        default: 'sweden'
      weeks:
        description: 'ISO weeks to backfill, comma-separated (YYYY-WW). Example: 2026-20,2026-21'
        required: true
        default: '2026-20'
      job_type:
        description: 'What to run: panel, mrp, or both'
        required: false
        default: 'panel'
      force:
        description: 'Overwrite existing results (true/false)'
        required: false
        default: 'false'

env:
  ACR_NAME:     pollstercontainers
  WORKER_IMAGE: weekly-worker

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 4320 # 72 hours
    steps:
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry:  ${{ env.ACR_NAME }}.azurecr.io
          username:  ${{ secrets.ACR_USERNAME }}
          password:  ${{ secrets.ACR_PASSWORD }}

      - name: Pull worker image
        run: docker pull ${{ env.ACR_NAME }}.azurecr.io/${{ env.WORKER_IMAGE }}:latest

      - name: Run backfill
        run: |
          docker run --rm \
            -e ENV=production \
            -e COUNTRIES="${{ github.event.inputs.countries }}" \
            -e JOB_TYPE="${{ github.event.inputs.job_type }}" \
            -e BACKFILL_WEEKS="${{ github.event.inputs.weeks }}" \
            -e BACKFILL_FORCE="${{ github.event.inputs.force }}" \
            -e BLOB_CONTAINER_NAME=generated-data \
            -e AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            -e AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
            -e AZURE_OPENAI_MODEL="${{ secrets.AZURE_OPENAI_MODEL }}" \
            -e AZURE_OPENAI_BASE_URL="${{ secrets.AZURE_OPENAI_BASE_URL }}" \
            -e COHERE_API_KEY="${{ secrets.COHERE_API_KEY }}" \
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.WORKER_IMAGE }}:latest \
            python -m data_generation.backfill_entry