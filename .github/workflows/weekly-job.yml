name: Weekly Data Generation

on:
  schedule:
    - cron: '0 23 * * 0'    # sunday 23:00 UTC = monday 00:00 CET
  workflow_dispatch:
    inputs:
      countries:
        description: 'Comma-separated countries (default: all)'
        required: false
        default: 'denmark'

env:
  ACR_NAME: pollstercontainers
  WORKER_IMAGE: weekly-worker

jobs:
  run-weekly-job:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull worker image
        run: docker pull ${{ env.ACR_NAME }}.azurecr.io/${{ env.WORKER_IMAGE }}:latest

      - name: Run worker
        run: |
          docker run --rm \
            -e ENV=production \
            -e COUNTRIES="${{ github.event.inputs.countries || 'denmark,netherlands,sweden' }}" \
            -e BLOB_CONTAINER_NAME=generated-data \
            -e AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.WORKER_IMAGE }}:latest