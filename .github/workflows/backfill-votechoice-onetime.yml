name: Backfill US Vote Choice (One-Time, Cross-Week Panel)

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country'
        required: false
        default: 'usa'
      target_year:
        description: 'Target ISO year (the week the survey is dated as)'
        required: true
        default: '2024'
      target_week:
        description: 'Target ISO week'
        required: true
        default: '46'
      source_year:
        description: 'Source ISO year (whose biography panel to reuse)'
        required: true
        default: '2026'
      source_week:
        description: 'Source ISO week'
        required: true
        default: '16'
      force:
        description: 'Force rerun even if lock exists (true/false)'
        required: false
        default: 'false'

jobs:
  backfill-onetime:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete existing ACI if present
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name vote-choice-backfill-onetime \
            --yes || true

      - name: Create and run ACI worker
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name vote-choice-backfill-onetime \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/weekly-worker:latest \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --restart-policy Never \
            --location westeurope \
            --cpu 2 \
            --memory 8 \
            --command-line "python -m data_generation.backfill_entry_onetime" \
            --environment-variables \
              ENV=production \
              COUNTRY="${{ github.event.inputs.country }}" \
              TARGET_YEAR="${{ github.event.inputs.target_year }}" \
              TARGET_WEEK="${{ github.event.inputs.target_week }}" \
              SOURCE_YEAR="${{ github.event.inputs.source_year }}" \
              SOURCE_WEEK="${{ github.event.inputs.source_week }}" \
              BACKFILL_FORCE="${{ github.event.inputs.force }}" \
              BLOB_CONTAINER_NAME=generated-data \
            --secure-environment-variables \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              AZURE_OPENAI_MODEL="${{ secrets.AZURE_OPENAI_MODEL }}" \
              AZURE_OPENAI_BASE_URL="${{ secrets.AZURE_OPENAI_BASE_URL }}" \
              COHERE_API_KEY="${{ secrets.COHERE_API_KEY }}" \
            --os-type Linux

      - name: Wait for ACI to finish
        timeout-minutes: 120
        run: |
          while true; do
            STATE=$(az container show \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name vote-choice-backfill-onetime \
              --query "containers[0].instanceView.currentState.state" \
              --output tsv)
            echo "Container state: $STATE"
            if [ "$STATE" = "Terminated" ]; then break; fi
            sleep 30
          done

      - name: Check exit code
        run: |
          EXIT_CODE=$(az container show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name vote-choice-backfill-onetime \
            --query "containers[0].instanceView.currentState.exitCode" \
            --output tsv)
          echo "Exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "One-time backfill failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Print container logs
        if: always()
        run: |
          az container logs \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name vote-choice-backfill-onetime

      - name: Clean up ACI
        if: always()
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name vote-choice-backfill-onetime \
            --yes