name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'ai-popup-lab-backend/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  ACR_NAME: pollstercontainers
  API_IMAGE: fastapi-backend

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-popup-lab-backend
          file: ./ai-popup-lab-backend/Dockerfile.api
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:latest
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.API_IMAGE }}:${{ github.sha }}